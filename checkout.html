<!DOCTYPE html>
<html>
<head>
    <title>Checkout | MORVENI</title>
    <link rel="stylesheet" href="checkout.css">
</head>
<body>
<nav id="navbar">
  <div class="nav-left">
    <a href="cart.html" class="back-home">← Back to Cart</a>
  </div>
  <div class="logo">
    <img src="llogo.png" alt="Morvani Logo" />
  </div>
</nav>

<h1 class="title">Checkout</h1>

<div class="steps">
    <span class="step active" id="stepShipping">1. Shipping</span>
    <span class="line"></span>
    <span class="step" id="stepPayment">2. Payment</span>
</div>

<div class="checkout-container">

    <div class="box checkout-step" id="shippingBox">
        <h2>Shipping Address</h2>

        <div class="saved-address">
            <label class="address-option">
                <input type="radio" name="address" value="home" checked>
                <div>
                    <strong>john xxx</strong><br>
                    Zgharta, Lebanon<br>
                    +9618188888
                </div>
            </label>

            <label class="address-option">
                <input type="radio" name="address" value="office">
                <div>
                    <strong>Office Address</strong><br>
                    Beirut, Lebanon<br>
                    +96170000000
                </div>
            </label>
        </div>

        <h3>Add New Address</h3>
        <div class="new-address">
            <input type="text" id="fullName" placeholder="Full Name">
            <input type="text" id="phone" placeholder="Phone Number">
            <input type="text" id="city" placeholder="City">
            <input type="text" id="street" placeholder="Street Address">
        </div>

        <button class="place-order" type="button" id="continuePayment">Continue to Payment</button>
    </div>

    <div class="box checkout-step hidden" id="paymentBox">
        <h2>Payment Method</h2>
        <p class="mini-text">Same checkout, separate payment step. No extra page was added.</p>

        <label class="payment-option">
            <input type="radio" name="pay" value="Credit / Debit Card" checked>
            <span>Credit / Debit Card</span>
        </label>

        <div class="card-info" id="cardInfo">
            <input type="text" id="cardNumber" placeholder="Card Number">
            <input type="text" id="expiry" placeholder="Expiry Date">
            <input type="text" id="cvv" placeholder="CVV">
        </div>

        <label class="payment-option">
            <input type="radio" name="pay" value="Cash on Delivery">
            <span>Cash on Delivery</span>
        </label>

        <label class="payment-option">
            <input type="radio" name="pay" value="Online Payment Gateway">
            <span>Online Payment Gateway</span>
        </label>

        <div class="button-row">
            <button class="secondary-btn" type="button" id="backShipping">Back</button>
            <button class="place-order" type="button" id="placeOrder">Place Order</button>
        </div>
        <p id="checkoutMessage" class="checkout-message"></p>
    </div>

    <div class="box summary">
        <h2>Order Summary</h2>
        <div id="summaryItems"></div>

        <div class="summary-line">
            <span>Items</span>
            <span id="subtotal">$80.00</span>
        </div>

        <div class="summary-line">
            <span>Shipping</span>
            <span id="shipping">$5.00</span>
        </div>

        <div class="summary-total">
            <span>Total</span>
            <span id="total">$85.00</span>
        </div>

        <p class="delivery">Estimated Delivery: 3 - 5 Days</p>
    </div>

</div>

<script src="checkout.js"></script>
</body>
</html>
