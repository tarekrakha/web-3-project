<html>

<head>

<title>Morvani Admin</title>

<link rel="stylesheet" href="adminproducts.css">
</head>

<body>

<div class="sidebar">
    <h2>MORVANI</h2>
    <ul>
        <li ><a href="adminproducts.html"> Products</a></li>
        <li><a href="order(S).html"> Orders</a></li>
         <li ><a href="analytics.html"> Analytics</a></li>
</div>

<div class="main">

    <div class="header">
        <h1>Product Management</h1>
        <button class="btn btn-add">+ Add Product</button>
    </div>

    <div class="card">
        <h3>Add / Edit Product</h3>

        <div class="form-grid">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Category</label>
                <select>
                    <option>Summer</option>
                    <option>Winter</option>
                    <option>Fall</option>
                    <option>Spring</option>
                </select>
            </div>
           <div class="form-group">
            <label >Color</label>
            <input type="text">
             
           </div>
            <div class="form-group">
            <label >Size</label>
           <select>
                    <option>X-Small</option>
                    <option>Small</option>
                    <option>Meduim</option>
                    <option>Large</option>
                    <option>X-Large</option>
                </select>
           </div>
            <div class="form-group">
                <label>Price</label>
                <input type="number">
            </div>

            <div class="form-group">
                <label>Stock</label>
                <input type="number">
            </div>
        </div>

        <button class="btn btn-save">Save Product</button>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Color</th>
                    <th>Size</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td><div class="product-img"></div></td>
                    <td><b>Morvani Hoodie</b></td>
                    <td>Winter</td>
                    <td>pink</td>
                    <td>small</td>
                    <td>$60</td>
                    <td><span class="badge">30 in stock</span></td>
                    <td>
                        <button class="btn btn-edit">Edit</button>
                        <button class="btn btn-delete">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
