<html>
<head>
<title>Morvani Admin</title>
<link rel="stylesheet" href="adminproducts.css">
</head>
<body>

<div class="sidebar">
    <h2>MORVENI</h2>
    <ul>
        <li class="active"><a href="adminproducts.html"> Products</a></li>
        <li><a href="order(S).html"> Orders</a></li>
        <li><a href="analytics.html"> Analytics</a></li>
        <li><a href="account-management.html"> account mangement</a></li>
        <li class="logout"><a href="homepage.html">log out</a></li>
    </ul>
</div>

<div class="main">

    <div class="header">
        <h1>Product Management</h1>
        <button class="btn btn-add" type="button" onclick="clearForm()">+ Add Product</button>
    </div>

    <div class="card">
        <h3>Add / Edit Product</h3>
        <p class="small-note">Product image upload is now saved to <b>uploads/products</b> and linked in MySQL.</p>

        <form id="productForm" enctype="multipart/form-data">
            <input type="hidden" name="id" id="productId">
            <div class="form-grid">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" name="name" id="name" required>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select name="category" id="category" required>
                        <option>Summer</option>
                        <option>Winter</option>
                        <option>Fall</option>
                        <option>Spring</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Color</label>
                    <input type="text" name="color" id="color" required>
                </div>

                <div class="form-group">
                    <label>Size</label>
                    <select name="size" id="size" required>
                        <option>X-Small</option>
                        <option>Small</option>
                        <option>Meduim</option>
                        <option>Large</option>
                        <option>X-Large</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Price</label>
                    <input type="number" name="price" id="price" step="0.01" min="0" required>
                </div>

                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" name="stock" id="stock" min="0" required>
                </div>

                <div class="form-group image-upload">
                    <label>Product Image</label>
                    <input type="file" name="image" id="image" accept="image/*">
                    <img id="preview" class="image-preview" alt="Preview">
                </div>
            </div>

            <button class="btn btn-save" type="submit">Save Product</button>
            <p id="message" class="message"></p>
        </form>
    </div>

    <div class="card table-card">
        <table>
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Color</th>
                    <th>Size</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="productsBody"></tbody>
        </table>
    </div>

</div>

<script src="adminproducts.js"></script>
</body>
</html>
