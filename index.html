<html>
<head>
<title>Create an Account:</title>
<link rel="stylesheet" href="create.css">

<script>
function createAccount(){
    var f = document.getElementsByClassName("fname")[0].value;
    var l = document.getElementsByClassName("lname")[0].value;
    var u = document.getElementsByClassName("user")[0].value;
    var m = document.getElementsByClassName("mail")[0].value;

    alert("First Name: " + f +
          "\nLast Name: " + l +
          "\nUsername: " + u +
          "\nEmail: " + m);
}
</script>
</head>

<body>

<div class="container">

<h1 class="p1">Create an account</h1>

First name:<br>
<input type="text" class="fname" placeholder="hadi"><br>

Last name:<br>
<input type="text" class="lname" placeholder="itani"><br>

Username:<br>
<input type="text" class="user" placeholder="hadiitani21"><br>

Email:<br>
<input type="email" class="mail" placeholder="hadi.itani@example.com"><br>

<em>Email must use @</em><br>

Password:<br>
<input type="password" class="pass" placeholder="*********"><br>
 <em>passwordmust be more than 8 caracter</em><br>
<button class="create" onclick="createAccount()">Create</button>

</div>

</body>

</html>
