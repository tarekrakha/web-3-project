<!DOCTYPE html>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

        <li><a href="adminproducts.html">Products</a> </li>

<!-- MAIN -->
<div class="main">

    <div class="header">
        <h1>Orders Management</h1>
    </div>

    <!-- ORDERS TABLE -->
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Product</th>
                    <th>size</th>
                    <th>color</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>#1001</td>
                    <td>Tarek</td>
                    <td>Morvani Hoodie</td>
                    <td>small</td>
                    <td>pink</td>
                    <td>$60</td>
                    <td><span class="badge pending">Pending</span></td>
                    <td>
                        <button class="btn btn-success">Approve</button>
                        <button class="btn btn-delete">Cancel</button>
                    </td>
                </tr>

                <tr>
                    <td>#1002</td>
                    <td>Ali</td>
                    <td>Leather Jacket</td>
                    <td>small</td>
                    <td>pink</td>
                    <td>$120</td>
                    <td><span class="badge delivered">Delivered</span></td>
                    <td>
                        <button class="btn btn-view">View</button>
                    </td>
                </tr>

                <tr>
                    <td>#1003</td>
                    <td>Sara</td>
                    <td>T-Shirts</td>
                    <td>small</td>
                    <td>pink</td>
                    <td>$150</td>
                    <td><span class="badge cancelled">Cancelled</span></td>
                    <td>
                        <button class="btn btn-view">View</button>
                    </td>
                </tr>

            </tbody>
        </table>
    </div>

</div>
