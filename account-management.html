<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morvani Admin - Account Management</title>
    <link rel="stylesheet" href="account-management.css" />
   
  </head>
  <body>
    <!-- SIDEBAR -->
    <div class="sidebar">
      <h2>MORVANI</h2>
      <ul>
        <li><a href="adminproducts.html">Products</a></li>
        <li><a href="order(S).html">Orders</a></li>
        <li><a href="analytics.html">Analytics</a></li>
        <li class="active"><a href="account-management.html">Account Management</a></li>
        <li class="logout"><a href="logout.php">Log Out</a></li>
      </ul>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div class="header">
        <div>
          <h1 style="margin:0">Account Management</h1>
         
        </div>
        
      </div>

      <!-- FILTER BAR -->
      <div class="card">
        <div class="grid">
          <div class="field" style="grid-column: span 2">
            <label for="q">Search</label>
            <input class="input" id="q" type="search" placeholder="Search by name or email..." />
            <div class="hint">Tip: try “admin” or “@gmail”.</div>
          </div>

          <div class="field">
            <label for="role">Role</label>
            <select class="select" id="role">
              <option value="all">All</option>
              <option value="admin">Admin</option>
              <option value="customer">Customer</option>
            </select>
          </div>

          <div class="field">
            <label for="status">Status</label>
            <select class="select" id="status">
              <option value="all">All</option>
              <option value="active">Active</option>
              <option value="blocked">Blocked</option>
            </select>
          </div>
        </div>
      </div>

      <!-- USERS TABLE -->
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Created</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="usersTbody"></tbody>
        </table>
        <p class="hint" id="emptyMsg" style="display:none;margin-top:10px">
          No users match your filters.
        </p>
      </div>
    </div>

    <!-- MODAL -->
    <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-label="Edit user">
        <header>
          <h3 id="modalTitle">User</h3>
          <button class="btn btn-ghost btn-sm" id="closeModal" type="button">Close</button>
        </header>
        <div class="content">
          <div class="grid">
            <div class="field" style="grid-column: span 2">
              <label for="nameInput">Full name</label>
              <input class="input" id="nameInput" type="text" />
            </div>
            <div class="field" style="grid-column: span 2">
              <label for="emailInput">Email</label>
              <input class="input" id="emailInput" type="email" />
            </div>
            <div class="field">
              <label for="roleInput">Role</label>
              <select class="select" id="roleInput">
                <option value="customer">Customer</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <div class="field">
              <label for="statusInput">Status</label>
              <select class="select" id="statusInput">
                <option value="active">Active</option>
                <option value="blocked">Blocked</option>
              </select>
            </div>
          </div>

        </div>
        <div class="footer">
          <button class="btn btn-danger" id="deleteUser" type="button">Delete</button>
          <button class="btn btn-success" id="saveUser" type="button">Save</button>
        </div>
      </div>
    </div>
  </body>
</html>


<script>
// ── account-management.html – real backend wiring ─────────────────────────
let allUsers = [];

async function loadUsers(){
    const q      = document.getElementById("q").value.trim();
    const role   = document.getElementById("role").value;
    const status = document.getElementById("status").value;

    const params = new URLSearchParams({ q, role, status });
    const res    = await fetch("account_management_api.php?" + params);
    const data   = await res.json();
    allUsers = data.users || [];
    renderUsers();
}

function renderUsers(){
    const tbody  = document.getElementById("usersTbody");
    const empty  = document.getElementById("emptyMsg");

    if (!allUsers.length){
        tbody.innerHTML = "";
        empty.style.display = "block";
        return;
    }
    empty.style.display = "none";
    tbody.innerHTML = allUsers.map(u => `
        <tr>
            <td>${u.first_name} ${u.last_name}</td>
            <td>${u.email}</td>
            <td><span class="badge">${u.role}</span></td>
            <td><span class="badge ${u.status}">${u.status}</span></td>
            <td>${u.created_at?.split(" ")[0] || "—"}</td>
            <td><button class="btn btn-primary btn-sm" onclick="openModal(${u.id})">Edit</button></td>
        </tr>`).join("");
}

function openModal(id){
    const u = allUsers.find(u => u.id == id);
    if (!u) return;
    document.getElementById("modalTitle").textContent   = u.first_name + " " + u.last_name;
    document.getElementById("nameInput").value          = u.first_name + " " + u.last_name;
    document.getElementById("emailInput").value         = u.email;
    document.getElementById("roleInput").value          = u.role || "customer";
    document.getElementById("statusInput").value        = u.status || "active";
    document.getElementById("saveUser").dataset.id      = u.id;
    document.getElementById("deleteUser").dataset.id    = u.id;
    document.getElementById("modalBackdrop").style.display = "flex";
}

document.getElementById("closeModal").addEventListener("click", () => {
    document.getElementById("modalBackdrop").style.display = "none";
});

document.getElementById("saveUser").addEventListener("click", async function(){
    const id     = this.dataset.id;
    const role   = document.getElementById("roleInput").value;
    const status = document.getElementById("statusInput").value;
    const name   = document.getElementById("nameInput").value.trim();
    const data   = new FormData();
    data.append("action", "update");
    data.append("id",     id);
    data.append("role",   role);
    data.append("status", status);
    if (name) data.append("name", name);
    await fetch("account_management_api.php", { method:"POST", body:data });
    document.getElementById("modalBackdrop").style.display = "none";
    loadUsers();
});

document.getElementById("deleteUser").addEventListener("click", async function(){
    if (!confirm("Delete this user?")) return;
    const id   = this.dataset.id;
    const data = new FormData();
    data.append("action", "delete");
    data.append("id",     id);
    await fetch("account_management_api.php", { method:"POST", body:data });
    document.getElementById("modalBackdrop").style.display = "none";
    loadUsers();
});

let _searchDebounce;
document.getElementById("q").addEventListener("input", function(){
    clearTimeout(_searchDebounce);
    _searchDebounce = setTimeout(loadUsers, 300);
});
document.getElementById("role").addEventListener("change",   loadUsers);
document.getElementById("status").addEventListener("change", loadUsers);

loadUsers();
</script>
